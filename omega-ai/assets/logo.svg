<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="omegaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring with animation -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#omegaGradient)" stroke-width="4" opacity="0.3">
    <animate attributeName="stroke-dasharray" from="0 534" to="534 0" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Omega symbol -->
  <path d="M 100 40 L 100 70 C 100 70 60 70 60 110 C 60 150 100 160 100 160 C 100 160 140 150 140 110 C 140 70 100 70 100 70 L 100 40 Z M 100 40 C 100 40 80 20 60 40 M 100 40 C 100 40 120 20 140 40" 
        fill="none" stroke="url(#omegaGradient)" stroke-width="6" stroke-linecap="round" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <!-- Rotating dots -->
  <g>
    <circle cx="100" cy="30" r="4" fill="#667eea">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="30" r="4" fill="#764ba2">
      <animateTransform attributeName="transform" type="rotate" from="120 100 100" to="480 100 100" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="30" r="4" fill="#f093fb">
      <animateTransform attributeName="transform" type="rotate" from="240 100 100" to="600 100 100" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- AI text -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#omegaGradient)" text-anchor="middle">OMEGA AI</text>
</svg>
